# Fly.io deployment configuration for vault.signet.tools
# Deploy: fly launch --config fly.toml

app = "signet-vault"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  SIGNET_HOSTING_MODE = "multi_tenant"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "signet_data"
  destination = "/home/signet/.signet"
